name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: cd NodeMobile && npm install

      - name: Run tests
        run: cd NodeMobile && npm test
        env:
          CI: true
          API_BASE: ${{ secrets.API_BASE }}

